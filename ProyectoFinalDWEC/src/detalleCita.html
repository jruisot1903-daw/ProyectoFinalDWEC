<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de la Cita</title>
    <link rel="stylesheet" href="../css/detalleCitas.css">
    <script type="module" src="../js/detallesCita.js"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Detalle de la cita</h1>

        <div class="fila">
            <span class="label">Paciente:</span>
            <span id="paciente"></span>
        </div>

        <div class="fila">
            <span class="label">Médico:</span>
            <span id="medico"></span>
        </div>

        <div class="fila">
            <span class="label">Inicio:</span>
            <span id="inicio"></span>
        </div>

        <div class="fila">
            <span class="label">Fin:</span>
            <span id="fin"></span>
        </div>

        <div class="acciones">
            <button id="btnModificar">Modificar</button>
            <button id="btnEliminar">Eliminar</button>
            <button id="btnVolver">Volver</button>
        </div>
    </div>

    <script type="module" src="detalleCita.js"></script>
</body>
</html>
