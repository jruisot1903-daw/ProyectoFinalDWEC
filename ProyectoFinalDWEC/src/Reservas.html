<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Citas - Área Sanitaria Norte de Málaga</title>
    <link rel="stylesheet" href="../css/resevas.css">

        <img src="../img/Junta de Andalucia/JA_logotipo_genérico.png" alt="">
        <h1>Reserva Citas Medicas</h1>

        <div class="login-header">
            <input type="text" name="login" id="login" placeholder="Introduzca su nombre">
            <input type="password" name="pass" id="pass" placeholder="Introduzca su contraseña">
            <span id="ayudaContra">Recuerda: La contraseña es tu DNI.</span>

            <button id="btn-login-user" class="btn btn-login">Login</button>
            <button id="btn-logout" class="btn btn-pass">Exit</button>
        </div>
        <p id="texto"> </p>
        <p id="err"></p>
    </header>

    <section class="section-pp">
       <div id='calendar'></div>
    </section>

    <footer>
        <div class="container">
            <p>Servicio Andaluz de la Salud</p>
